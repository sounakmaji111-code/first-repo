<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1285a8; /* subtle blue change */
            font-family: Arial, sans-serif;
        }

        .container {
            width: 400px;
            background-color: #ffffff;
            margin: 60px auto;
            padding: 30px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #222;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            background-color: #e0e0e0; /* slight gray change */
            border-radius: 5px;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            display: block;
            margin: auto;
            padding: 10px 35px;
            background-color: #0f6f8f; /* different button color */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0c5f7a;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Registration Form</h2>

        <form>
            <input type="text" placeholder="Name*" required>

            <input type="email" placeholder="Email*" required>

            <input 
                type="tel" 
                placeholder="Phone*" 
                pattern="[0-9]{10}" 
                required
            >

            <select required>
                <option value="">Subject*</option>
                <option>C Programming</option>
                <option>Data Structures</option>
                <option>Algorithm</option>
                <option>Python Programming</option>
            </select>

            <textarea placeholder="Message*" required></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>

</body>
</html>
